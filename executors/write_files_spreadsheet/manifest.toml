# Manifest dell'executor `write_files_spreadsheet` — Metnos v1.1
# Naming compositivo §2.2: azione_oggetto_qualifier.
# Dispatcher canonical spreadsheet write/append: default LOCALE, Google opt-in.

manifest_format = "1.0"

name        = "write_files_spreadsheet"
version     = "0.2.0"
author      = "Roberto Brunialti"
affinity    = [
    "spreadsheet", "foglio elettronico", "foglio di calcolo", "xlsx",
    "aggiorna celle", "modifica celle", "scrivi nel foglio", "write sheet",
    "update sheet", "append rows", "aggiungi righe", "modifica foglio esistente"
]
revertible  = true
# §2.3 multistage: file NUOVO → `delete_created_paths`; file PREESISTENTE
# (overwrite/append locale) → `restore_blob_backup` dai bytes previ (il backend
# locale salva il blob prima di modificare). Backend Google: niente blob locale
# → l'undo riporta onestamente nulla-ribaltato (§2.8), non e' un errore.
reverse_pattern = ["restore_blob_backup", "delete_created_paths"]
lifecycle   = "active"

[description]
it = "SCOPO: scrive un foglio di calcolo LOCALE da `values` (matrice inline) o da `from_step`+`columns` (dati di uno step precedente); lo CREA se non esiste. «metti/salva/esporta dati in uno spreadsheet». PATTERN: write_files_spreadsheet(values=[[\"a\",1],[\"b\",2]]). NON: file di testo -> write_files; Google -> client=\"google_workspace\"; dati da uno step = from_step+columns, MAI placeholder ${stepN...} in values. OUT: results: list[{spreadsheet_id, path, updated_cells, created, mode}]; spreadsheet_id E' il PATH, allegabile a send_messages."
en = "SCOPO: writes a LOCAL spreadsheet from `values` (inline matrix) or from `from_step`+`columns` (data of a previous step); CREATES it if missing. «put/save/export data into a spreadsheet». PATTERN: write_files_spreadsheet(values=[[\"a\",1],[\"b\",2]]). NON: text file -> write_files; Google -> client=\"google_workspace\"; data from a step = from_step+columns, NEVER ${stepN...} placeholders in values. OUT: results: list[{spreadsheet_id, path, updated_cells, created, mode}]; spreadsheet_id IS the PATH, attachable to send_messages."

[code]
files  = ["write_files_spreadsheet.py"]
digest = "sha256:2be6961fdb213479d544493c4edfec27d7ef2e9aa3e8a540b33a7f754084ec7c"

[args]
type     = "object"
required = []
# Una fonte dati fra: matrice diretta `values`, oppure `entries` (da `from_step`)
# + `columns`. from_step soddisfa il vincolo (risolto a entries dal runtime).
requires_one_of = [["values", "entries", "from_step"]]

[args.properties.entries]
type    = "array"
items   = { type = "object" }
runtime_resolved = true

[args.properties.entries.description]
it = "Lista di record (dict) da un passo precedente, popolata via `from_step`. Mappata a righe secondo `columns`. Non passare a mano: usa from_step=N."
en = "List of records (dict) from a previous step, populated via `from_step`. Mapped to rows per `columns`. Do not pass by hand: use from_step=N."

[args.properties.columns]
type    = "array"
items   = { type = "string" }
default = []

[args.properties.columns.description]
it = "Campi delle entries da usare come colonne, in ordine (es. ['path','descrizione']). Sinonimi risolti (descrizione->description). Vuoto = tutti i campi non interni."
en = "Entry fields to use as columns, in order (e.g. ['path','description']). Synonyms resolved (descrizione->description). Empty = all non-internal fields."

[args.properties.spreadsheet_id]
type    = "string"
default = ""
# FIX D'ISTANZA (2/6, da generalizzare nel verb-contract write=upsert): il
# planner LLM, vedendo `spreadsheet_id`, lo CHIEDE sempre (get_inputs) anche
# quando il foglio e' da creare → blocca "metti/salva in uno spreadsheet". Lo
# marchiamo runtime_resolved: NON esposto all'LLM (no domanda), ma resta
# iniettabile da from_step (catena create→write) o estratto dall'args_extractor
# (path esplicito nella query). Assente → backend upsert auto-crea. Costo:
# il caso google_workspace (id Drive obbligatorio) deve arrivare da from_step.
runtime_resolved = true

[args.properties.spreadsheet_id.description]
it = "LOCAL: PATH del file .xlsx/.csv. OPZIONALE: se omesso, auto-nome; se il path non esiste, il file viene CREATO (upsert). google_workspace: ID Drive esistente (richiesto). MATCH ESATTO, wildcard NON supportati."
en = "LOCAL: PATH of the .xlsx/.csv file. OPTIONAL: if omitted, auto name; if the path does not exist, the file is CREATED (upsert). google_workspace: existing Drive ID (required). EXACT MATCH, wildcards NOT supported."

[args.properties.values]
type    = "array"
items   = { type = "array" }

[args.properties.values.description]
it = "Matrice di celle [riga][colonna] gia' pronta. Es. [['nome','eta'],['Alice',30]]. Alternativa a entries+columns. Per dati da un passo precedente preferisci from_step+columns."
en = "Ready cell matrix [row][column]. E.g. [['name','age'],['Alice',30]]. Alternative to entries+columns. For data from a previous step prefer from_step+columns."

[args.properties.mode]
type    = "string"
enum    = ["overwrite", "append"]
default = "overwrite"

[args.properties.mode.description]
it = "MATCH ESATTO: 'overwrite' (default, riscrive il foglio) o 'append' (aggiunge in coda alle righe esistenti)."
en = "EXACT MATCH: 'overwrite' (default, rewrites the sheet) or 'append' (adds after existing rows)."

[args.properties.sheet_name]
type    = "string"
default = ""

[args.properties.sheet_name.description]
it = "LOCAL: nome del foglio target (default: primo foglio). google_workspace: usa invece `range`."
en = "LOCAL: target sheet name (default: first sheet). google_workspace: use `range` instead."

[args.properties.range]
type    = "string"
default = ""

[args.properties.range.description]
it = "Solo google_workspace: range A1 (es. 'Sheet1!A1:C3'). Ignorato dal backend locale (usa `sheet_name`)."
en = "google_workspace only: A1 range (e.g. 'Sheet1!A1:C3'). Ignored by the local backend (use `sheet_name`)."

[args.properties.client]
type    = "string"
enum    = ["local", "google_workspace"]
default = "local"

[args.properties.client.description]
it = "Backend: 'local' (default, file .xlsx/.csv) o 'google_workspace' (Google Sheets online, richiede OAuth + range)."
en = "Backend: 'local' (default, .xlsx/.csv file) or 'google_workspace' (online Google Sheets, requires OAuth + range)."

[output]
schema_inline = """
{
  ok: bool,
  n_written: int,
  updated_cells: int,
  updated_rows: int,
  spreadsheet_id: str,
  mode: 'overwrite'|'append',
  results: Array<{ok, spreadsheet_id, updated_cells, mode}>,
  used: int,
  files_source: 'local' | 'google_workspace',
  error?: str,
  error_class?: str,
  decision?: 'needs_inputs'
}
"""

[[capabilities]]
name = "metnos:write"
hint = ["spreadsheet:local"]

[[tests]]
name   = "values_only_auto_name_upsert_creates"
input  = { values = [["x", "y"]] }
expect = { ok = true }

[[tests]]
name   = "entries_columns_builds_sheet"
input  = { entries = [{ path = "/a.jpg", description = "x" }], columns = ["path", "descrizione"] }
expect = { ok = true }

[[tests]]
name   = "missing_data_source_fails"
input  = { spreadsheet_id = "/tmp/metnos_x.xlsx" }
expect = { ok = false }

[[tests]]
name   = "invalid_mode_fails"
input  = { spreadsheet_id = "/tmp/metnos_x.xlsx", values = [["x"]], mode = "merge" }
expect = { ok = false, error_contains = "mode" }

[[tests]]
name   = "nonexistent_local_path_upsert_creates"
input  = { spreadsheet_id = "/tmp/metnos_upsert_test.xlsx", values = [["x"]] }
expect = { ok = true }

[[tests]]
name   = "unsupported_client_fails"
input  = { spreadsheet_id = "1abc", values = [["x"]], client = "dropbox" }
expect = { ok = false, error_contains = "Operazione non applicabile per questo provider" }
