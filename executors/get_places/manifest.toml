# Manifest dell'executor `get_places` — Metnos v1.1
# Naming compositivo: verbo_oggetto_plurale. Vettoriale per costruzione.

manifest_format = "1.0"

name        = "get_places"
version     = "0.3.0"
author      = "Roberto Brunialti"
affinity    = ["get", "place", "luogo", "reverse", "geocode", "coordinate", "indirizzo", "city", "GPS"]
revertible  = false
lifecycle   = "active"

[description]
it = "Reverse geocoding: dato una lista di coordinate o entries con campo `gps`, arricchisce ogni elemento con `place: str` (slug del luogo, es. 'roma', 'boulder'; 'unknown' se gps mancante o servizio satura). PASSAGGIO DELLA LISTA DI ENTRIES: usa `from_step=N` dove N e' lo step precedente (es. get_files al passo 1 ha estratto gps → from_step=1). Il runtime recupera automaticamente le entries dallo scratchpad. Per coordinate raw (no entries dict): usa `coords=[{lat,lon},...]`. Le due modalita' sono mutuamente esclusive. Backend: Nominatim pubblico (rate-limit ~1/s) con cache locale; override via env METNOS_NOMINATIM_URL per self-hostato. La logica di reverse-geocode e' anche usata internamente da get_files quando 'place' e' fra i fields richiesti."
en = "Reverse geocoding: given a list of coordinates or entries with field `gps`, enrich each element with `place: str` (place slug, e.g., 'roma', 'boulder'; 'unknown' if gps is missing or service is saturated). PASSING THE LIST OF ENTRIES: use `from_step=N` where N is the previous step (e.g., get_files at step 1 extracted gps → from_step=1). The runtime automatically retrieves the entries from the scratchpad. For raw coordinates (no entries dict): use `coords=[{lat,lon},...]`. The two modes are mutually exclusive. Backend: Public Nominatim (rate-limit ~1/s) with local cache; override via env METNOS_NOMINATIM_URL for self-hosted. The reverse-geocode logic is also used internally by get_files when 'place' is among the requested fields."

[code]
files  = ["get_places.py"]
digest = "sha256:0874ccaef4297ebaf4fee06f8719b92d0d0a74577cbe45007c41e9d1296715df"

[args]
type     = "object"

[args.properties.from_step]
type        = "integer"
minimum     = 1

[args.properties.from_step.description]
it = "Numero dello step precedente (in questo turno) che ha prodotto la lista di entries con campo `gps`. Mutuamente esclusivo con coords. Es. al passo 1 get_files estrae gps, al passo 2 get_places riceve from_step=1 e arricchisce ogni entry con `place`."
en = "Number of the previous step (in this turn) that produced the list of entries with the field `gps`. Mutually exclusive with coords. E.g., at step 1 get_files extracts gps, at step 2 get_places receives from_step=1 and enriches each entry with `place`."

[args.properties.coords]
type        = "array"
items       = { type = "object" }

[args.properties.coords.description]
it = "Lista di coordinate {lat, lon} costruite ad hoc. Mutuamente esclusiva con `from_step`. Output: lista {lat, lon, place}."
en = "List of ad hoc constructed coordinates {lat, lon}. Mutually exclusive with `from_step`. Output: list {lat, lon, place}."

[[capabilities]]
name = "net:read"
hint = ["nominatim.openstreetmap.org", "localhost"]

[[tests]]
name   = "args_invalidi_nessuno_dei_due"
input  = { }
expect = { ok = false, error_contains = "Manca un argomento obbligatorio" }

[[tests]]
name   = "args_invalidi_entrambi"
input  = { coords = [], entries = [] }
expect = { ok = false, error_contains = "Argomenti non validi" }

[[tests]]
name   = "lista_coords_vuota_ok"
input  = { coords = [] }
expect = { ok = true, ok_count_eq = 0 }

[[tests]]
name   = "lista_entries_vuota_ok"
input  = { entries = [] }
expect = { ok = true, ok_count_eq = 0 }

[[tests]]
name   = "entries_senza_gps_diventa_unknown"
input  = { entries = [{path = "/tmp/foo.jpg"}, {path = "/tmp/bar.jpg", gps = {}}] }
expect = { ok = true, ok_count_eq = 2 }
