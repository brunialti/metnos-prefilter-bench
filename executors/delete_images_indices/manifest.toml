# Manifest dell'executor `delete_images_indices` — Metnos v1.1
# Naming compositivo: azione_oggetto[_modalita'] (verb=delete, obj=images,
# modalita'=indices). ADR 0086 (rinominato 5/5/2026).

manifest_format = "1.0"

name        = "delete_images_indices"
version     = "0.1.0"
author      = "Roberto Brunialti"
affinity    = ["cancella", "delete", "rimuovi", "remove", "indice", "index", "rebuild", "free-storage", "foto", "image"]
revertible  = false

[description]
it = "Cancella l'indice persistente delle immagini in `base_path` per il tipo specificato. `idx='scene'|'persons'|'gps'|'all'` (default 'all'). Operazione NON reversibile (no blob backup di default): usa `dry_run=true` per vedere cosa cancellerebbe senza toccare niente. NON CONFONDERE CON: `delete_files` (cancella le foto reali sul disco); questo cancella SOLO il derivato persistente in `~/.local/share/metnos/index/image/`. USO CORRETTO: free-up storage o rebuild forzato (alternativa a force=true di create_images_indices). Output: `{ok, deleted: [paths], freed_bytes, dry_run}`."
en = "Delete the persistent image index in `base_path` for the specified type. `idx='scene'|'persons'|'gps'|'all'` (default 'all'). Operation is NOT reversible (no blob backup by default): use `dry_run=true` to see what would be deleted without touching anything. DO NOT CONFUSE WITH: `delete_files` (deletes actual photos on disk); this ONLY deletes the persistent derivative in `~/.local/share/metnos/index/image/`. CORRECT USE: free-up storage or forced rebuild (alternative to force=true in create_images_indices). Output: `{ok, deleted: [paths], freed_bytes, dry_run}`."

[code]
files  = ["delete_images_indices.py"]
digest = "sha256:1a5190d1f45a206b81e4dcb25712e69ec2c051537158c2e5705311f689468b70"

[args]
type     = "object"
required = ["base_path"]

[args.properties.base_path]
type        = "string"

[args.properties.base_path.description]
it = "Directory radice della collezione (la stessa usata in create_images_indices). Path assoluto o ~ espandibile."
en = "Root directory of the collection (the same one used in create_images_indices). Absolute path or expandable ~."

[args.properties.idx]
type        = "string"
enum        = ["scene", "persons", "gps", "all"]
default     = "all"

[args.properties.idx.description]
it = "Quale indice cancellare. 'all' (default) = tutti i tipi (scene+persons+gps); altrimenti uno solo."
en = "Which index to delete. 'all' (default) = all types (scene+persons+gps); otherwise only one."

[args.properties.dry_run]
type        = "boolean"
default     = false

[args.properties.dry_run.description]
it = "Se true, non cancella, solo elenca cosa cancellerebbe."
en = "If true, it does not delete, it only lists what it would delete."

[[capabilities]]
name = "index.write"
hint = ["~/.local/share/metnos/index/image/**"]

[[tests]]
name   = "base_path_inesistente_ok_nothing_to_delete"
input  = { base_path = "/tmp/metnos_does_not_exist_xyz_del_idx", idx = "all" }
expect = { ok = true }

[[tests]]
name   = "idx_invalido_fallisce"
input  = { base_path = "/tmp/metnos_test_idx_del", idx = "pippo" }
expect = { ok = false, error_contains = "idx" }
